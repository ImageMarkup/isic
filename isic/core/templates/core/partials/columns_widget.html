<div class="join" role="group" aria-label="Grid columns">
  <button class="join-item btn btn-outline btn-xs" @click="decrease()" aria-label="Decrease columns">
    <i class="ri-subtract-line"></i>
  </button>
  <span class="join-item btn btn-outline btn-xs" aria-disabled="true">Columns</span>
  <button class="join-item btn btn-outline btn-xs" @click="increase()" aria-label="Increase columns">
    <i class="ri-add-line"></i>
  </button>
</div>
