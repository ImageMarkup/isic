<button class="btn" popovertarget="image-gallery-actions">
  Actions
  <i class="ri-arrow-down-s-line"></i>
</button>
<ul class="dropdown dropdown-end menu w-52 rounded-box bg-base-100 shadow-sm"
    popover id="image-gallery-actions">
  <li>
    <button @click="$refs.collectionPickerModal.showModal()">Add results to collection</button>
  </li>
  {% if request.user.is_superuser %}
    <li>
      <button @click="downloadAsZip()">Download as ZIP</button>
    </li>
  {% endif %}
</ul>
