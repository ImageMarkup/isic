{% load accession %}

<div>
  <div x-data="{ hovered: false }" class="pb-4">
    {% block thumb %}
      {% include 'core/partials/image_thumb.html' %}
    {% endblock %}
  </div>

  {% block below_thumb %}
    <div class="flex">
      <a href="{{image.get_absolute_url}}">{{image.isic_id}}</a>

      </a>
    </div>
  {% endblock %}
</div>
