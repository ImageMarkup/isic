<div x-data="submitReviewButton()">
  <button
    :disabled="submitting || submitted"
    @click="submit"
    type="button"
    class="btn btn-primary">
    <span x-show="submitting" class="loading loading-spinner loading-sm"></span>
    <span x-text="submitted ? 'Submitted' : (submitting ? 'Submitting' : 'Accept remaining')"></span>
  </button>
</div>

<script type="text/javascript">
  function submitReviewButton() {
    return {
      submitting: false,
      submitted: false,
      async submit() {
        this.submitting = true;
        const accessionReviews = Object.entries(Alpine.store('accessions').items).map(function(x) {
          return {id: x[0], value: x[1] === null ? true : x[1]};
        });

        try {
          const { data } = await axiosSession.post('{% url "api:accession_review_bulk_create" %}',
            accessionReviews);
          this.submitted = true;
          this.submitting = false;
          // reload the page. use this instead of .reload() since this
          // version won't keep users at the bottom of the page.
          window.location.href = window.location.href;
        } catch (e) {
          this.submitting = false;
          console.error(e);
          alert('Something went wrong.');
        }
      }
    };
  }
</script>
