[tox]
requires =
    tox-uv
env_list =
    lint
    # type
    test
    check-migrations

[testenv]
runner = uv-venv-lock-runner
pass_env =
    DJANGO_*
    RUFF_CACHE_DIR
    MYPY_CACHE_DIR
extras =
    development

[testenv:lint]
package = skip
dependency_groups =
    lint
commands =
    ruff check
    ruff format --check
    semgrep scan --quiet --config rules.yml --error ./isic
    djhtml --check ./isic

[testenv:format]
package = skip
dependency_groups =
    lint
commands =
    ruff check --fix-only
    ruff format
    djhtml ./isic

[testenv:type]
dependency_groups =
    type
    test
commands =
    mypy {posargs}

[testenv:test]
dependency_groups =
    test
set_env =
    DJANGO_ALLOW_ASYNC_UNSAFE = true
commands_pre =
    playwright install --only-shell chromium
commands =
    pytest {posargs}

[testenv:test-flaky]
base =
    testenv
    testenv:test
commands =
    pytest --count 5 --random-order {posargs}

[testenv:check-migrations]
set_env =
    DJANGO_SETTINGS_MODULE = isic.settings.testing
commands =
    {envpython} ./manage.py makemigrations --check --dry-run
