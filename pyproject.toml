[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "isic"
version = "0.0.0"
requires-python = ">=3.12"
license = { text = "Apache 2.0" }
classifiers = ["Private :: Do Not Upload"]
dependencies = [
    "bcrypt",
    "celery>=5.4.0",
    "deepdiff",
    "dj-database-url",
    "dj_email_url",
    "django-allauth>=0.56.0",
    "django-auth-style",
    "django-cachalot @ git+https://github.com/noripyt/django-cachalot.git@8d5a159",
    "django-cache-url",
    "django-click",
    "django-cors-headers",
    "django-extensions",
    "django-filter",
    "django-girder-utils",
    "django-json-widget",
    "django-markdownify",
    "django-ninja>=1.0a3",
    "django-oauth-toolkit<2.0.0",
    "django-object-actions",
    "django-redis",
    "django-s3-file-field[s3]>=1",
    "django-storages>1.14.2",
    "django-stubs-ext",
    "django-widget-tweaks",
    "django[argon2]>=5.1,<6",
    "gdal",
    "google-analytics-data",
    "gunicorn",
    "hashids",
    "hiredis",
    "isic-metadata>=4.7.0",
    "jaro-winkler",
    "numpy",
    "oauth2client",
    "opensearch-dsl",
    "opensearch-py",
    "pandas",
    "Pillow",
    "psycopg",
    "pycountry",
    "pydantic",
    "pymongo",
    "pyparsing",
    "python-magic",
    "redis",
    "requests",
    "rich",
    "sentry-sdk[pure_eval]",
    "tenacity",
    "whitenoise[brotli]",
    "zipfile-deflate64",
]

[dependency-groups]
dev = [
    "django-debug-toolbar",
    "django-s3-file-field[minio]>=1",
    "ipython",
    "memray",
    "pyinstrument",
    "werkzeug",
    {include-group = "type"},
]
lint = [
     "ruff==0.9.4",
     "semgrep",
]
lint-html = [
     "djhtml"
]
format = [
     "ruff==0.9.4",
]
format-html = [
     "djhtml"
]
test = [
    "coverage[toml]",
    "django-fastdev",
    "factory-boy",
    "hypothesis",
    "pytest",
    "pytest-cov",
    "pytest-django",
    "pytest-factoryboy",
    "pytest-lazy-fixtures",
    "pytest-mock",
    "pytest-random-order",
    "pytest-repeat",
]
type = [
    "django-stubs[compatible-mypy]",
    "mypy",
    "types-requests",
]

[tool.hatch.build]
packages = ["isic"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["typings"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  # Incompatible with formatter
  # https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules
  "COM812", # missing-trailing-comma
  "COM819", # prohibited-trailing-comma
  "D206", # indent-with-spaces
  "D300", # triple-single-quotes
  "E111", # indentation-with-invalid-multiple
  "E114", # indentation-with-invalid-multiple-comment
  "E117", # over-indented
  "ISC001", # single-line-implicit-string-concatenation
  "ISC002", # multi-line-implicit-string-concatenation
  "Q", # flake8-quotes
  "W191", # tab-indentation

  "A003", # Class attribute is shadowing a Python builtin
  "ANN", # flake8-annotations
  "ARG001", # Unused function argument
  "ARG002", # Unused method argument
  "D1", # Missing docstring
  "EM101", # Exception must not use a string literal, assign to variable first
  "EM102", # Exception must not use an f-string literal, assign to variable first
  "ERA001", # Found commented-out code
  "FIX", # flake8-fixme
  "TD002", # Missing author in TODO
  "TD003", # Missing issue link on the line following this TODO
  "TRY003", # Avoid specifying long messages outside the exception class
  "RET505", # superfluous else return statement

  # Excessive
  "A005", # module shadows built-in
  "RET503", # implict return
  "RET506", # else after raise
  "PLR2004", # magic value used in comparison

  # Try to fix upstream
  "RUF012", #  Mutable class attributes should be annotated with `typing.ClassVar`

  # Try to fix in the future
  "DJ001", # null=True on char fields
  "TC002",  # use type-checking blocks
  "TRY002", # create custom exceptions
  "A002", # shadowing builtins, we do this a lot with id for endpoints
]

[tool.ruff.lint.per-file-ignores]
"isic/settings.py" = [
  "FBT003", # boolean positional value
]
"scripts/**" = [
  "INP001", # File is part of an implicit namespace package
]
"**/migrations/**" = [
  "N806", # Variable in function should be lowercase
  "RUF012", # Mutable class attributes should be annotated with `typing.ClassVar`
]
"**/management/commands/**" = [
  "INP001", # File is part of an implicit namespace package
]
"**/tests/**" = [
  "DJ007", # Do not use `__all__`
  "DJ008", # Model does not define `__str__` method
  "PLR0913", # Too many arguments to function call
  "PLR2004", # Magic value used in comparison
  "S", # flake8-bandit
  "SLF001", # Private member accessed
]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint.flake8-self]
extend-ignore-names = ["_base_manager", "_default_manager",  "_meta"]

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = ["ninja.Query"]

[tool.ruff.lint.isort]
# Sort by name, don't cluster "from" vs "import"
force-sort-within-sections = true

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.mypy]
files = [
  "isic"
]
show_error_codes = true
disable_error_code = "var-annotated,return"
ignore_missing_imports = true
warn_unused_configs = true
check_untyped_defs = true
plugins = ["mypy_django_plugin.main"]

[[tool.mypy.overrides]]
module = ["isic.core.pagination"]
ignore_errors = true

[tool.django-stubs]
django_settings_module = "isic.settings.testing"
strict_settings = false

[tool.pytest.ini_options]
addopts = [
  # Test utilies should be imported absolutely from the pythonpath,
  # so use the Pytest-reccomended "importlib" mode
  "--import-mode=importlib",
  "--strict-config",
  "--strict-markers",
  "--showlocals",
]
DJANGO_SETTINGS_MODULE = "isic.settings.testing"
