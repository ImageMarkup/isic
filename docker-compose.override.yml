services:
  django:
    build:
      context: .
      dockerfile: ./dev/django.Dockerfile
    command: [
      "./manage.py",
      "runserver_plus", "0.0.0.0:8000"
    ]
    # Log printing is enhanced by a TTY
    tty: true
    working_dir: /home/vscode/isic
    env_file: ./dev/.env.docker-compose
    volumes:
      - .:/home/vscode/isic
      - pkg_cache:/home/vscode/pkg-cache
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: ./dev/django.Dockerfile
    command: [
      "uv", "run",
      "celery",
      "--app", "isic.celery",
      "worker",
      "--loglevel", "INFO",
      "--without-mingle",
      "--without-heartbeat",
      "--without-gossip"
    ]
    # uv progress doesn't display properly with a Docker TTY
    tty: false
    working_dir: /home/vscode/isic
    env_file: ./dev/.env.docker-compose
    volumes:
      - .:/home/vscode/isic
      - pkg_cache:/home/vscode/pkg-cache
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  celerybeat:
    build:
      context: .
      dockerfile: ./dev/django.Dockerfile
    command: [
      "uv", "run",
      "celery",
      "--app", "isic.celery",
      "beat",
      "--loglevel", "INFO"
    ]
    tty: false
    working_dir: /home/vscode/isic
    env_file: ./dev/.env.docker-compose
    volumes:
      - .:/home/vscode/isic
      - pkg_cache:/home/vscode/pkg-cache
    depends_on:
      rabbitmq:
        condition: service_healthy

  zipstreamer:
    image: ghcr.io/imagemarkup/isic-zipstreamer:master
    environment:
      ZS_LISTFILE_URL_PREFIX: "http://django/api/v2/zip-download/file-listing/?token="
    ports:
      - "${ZIPSTREAMER_PORT:-4008}:4008"

volumes:
  pkg_cache:
